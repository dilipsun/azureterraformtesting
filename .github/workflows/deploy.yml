name: Terraform Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required for OIDC login to Azure.
permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.5"
  # Backend / working directory for Terraform
  TF_WORKING_DIR: "."

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Azure login using OIDC only ---
      # Uses: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- Pull Terraform auth secrets from Azure Key Vault ---
      # These are used only by Terraform steps below.
      - name: Get secrets from Key Vault
        id: kv
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            VAULT_NAME="${{ secrets.KEY_VAULT_NAME }}"

            ARM_CLIENT_ID=$(az keyvault secret show --vault-name "$VAULT_NAME" --name "arm-client-id" --query value -o tsv)
            ARM_CLIENT_SECRET=$(az keyvault secret show --vault-name "$VAULT_NAME" --name "arm-client-secret" --query value -o tsv)
            ARM_TENANT_ID=$(az keyvault secret show --vault-name "$VAULT_NAME" --name "arm-tenant-id" --query value -o tsv)
            ARM_SUBSCRIPTION_ID=$(az keyvault secret show --vault-name "$VAULT_NAME" --name "arm-subscription-id" --query value -o tsv)

            # Mask so they never appear in logs
            echo "::add-mask::$ARM_CLIENT_ID"
            echo "::add-mask::$ARM_CLIENT_SECRET"
            echo "::add-mask::$ARM_TENANT_ID"
            echo "::add-mask::$ARM_SUBSCRIPTION_ID"

            # Expose to later steps via the step environment file
            echo "ARM_CLIENT_ID=$ARM_CLIENT_ID" >> "$GITHUB_ENV"
            echo "ARM_CLIENT_SECRET=$ARM_CLIENT_SECRET" >> "$GITHUB_ENV"
            echo "ARM_TENANT_ID=$ARM_TENANT_ID" >> "$GITHUB_ENV"
            echo "ARM_SUBSCRIPTION_ID=$ARM_SUBSCRIPTION_ID" >> "$GITHUB_ENV"

      # - name: Setup Terraform
      #   uses: hashicorp/setup-terraform@v3
      #   with:
      #     terraform_version: ${{ env.TF_VERSION }}

