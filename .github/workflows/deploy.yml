name: Terraform Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required for OIDC login to Azure (recommended over client secret)
permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.5"
  # Backend / working directory for Terraform
  TF_WORKING_DIR: "./infra"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Azure login using the App Registration (service principal) ---
      # Store these values as GitHub repository/environment secrets.
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # If you use a client secret instead of OIDC, replace the three
          # lines above with:
          # creds: ${{ secrets.AZURE_CREDENTIALS }}

      # --- Pull secrets from Azure Key Vault ---
      # Reads secrets and exposes them as masked outputs for later steps.
      - name: Get secrets from Key Vault
        id: kv
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            VAULT_NAME="${{ secrets.KEY_VAULT_NAME }}"

            ARM_CLIENT_ID=$(az keyvault secret show --vault-name "$VAULT_NAME" --name "arm-client-id" --query value -o tsv)
            ARM_CLIENT_SECRET=$(az keyvault secret show --vault-name "$VAULT_NAME" --name "arm-client-secret" --query value -o tsv)

            # Mask so they never appear in logs
            echo "::add-mask::$ARM_CLIENT_ID"
            echo "::add-mask::$ARM_CLIENT_SECRET"

            # Expose to later steps via the step environment file
            echo "ARM_CLIENT_ID=$ARM_CLIENT_ID" >> "$GITHUB_ENV"
            echo "ARM_CLIENT_SECRET=$ARM_CLIENT_SECRET" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Terraform reads these ARM_* variables automatically for the azurerm provider
      - name: Terraform Init
        env:
          ARM_CLIENT_ID: ${{ env.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ env.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          ARM_CLIENT_ID: ${{ env.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ env.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform plan -out=tfplan -input=false

      # Only apply on push to main (not on PRs)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          ARM_CLIENT_ID: ${{ env.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ env.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -input=false -auto-approve tfplan
