name: Terraform Management Group RBAC.

on:
  pull_request:
    paths:
      - "*.tf"
      - "*.tfvars"
      - "*.tfvars.json"
      - "backend.hcl.example"
      - ".github/workflows/terraform-management-group-rbac.yml"
  push:
    branches:
      - main
    paths:
      - "*.tf"
      - "*.tfvars"
      - "*.tfvars.json"
      - "backend.hcl.example"
      - ".github/workflows/terraform-management-group-rbac.yml"
  workflow_dispatch:
    inputs:
      run_apply:
        description: "Run terraform apply (true/false)"
        required: true
        default: "false"

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

permissions:
  contents: read
  id-token: write

jobs:
  fmt_validate:
    name: Fmt and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: fmt_validate
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      TF_VAR_principal_object_id: ${{ secrets.TF_VAR_PRINCIPAL_OBJECT_ID }}
      TF_VAR_root_management_group_id: ${{ secrets.TF_VAR_ROOT_MANAGEMENT_GROUP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Verify required secrets
        run: |
          test -n "$ARM_CLIENT_ID" || (echo "Missing ARM_CLIENT_ID" && exit 1)
          test -n "$ARM_TENANT_ID" || (echo "Missing ARM_TENANT_ID" && exit 1)
          test -n "$ARM_SUBSCRIPTION_ID" || (echo "Missing ARM_SUBSCRIPTION_ID" && exit 1)
          test -n "$TF_VAR_principal_object_id" || (echo "Missing TF_VAR_PRINCIPAL_OBJECT_ID" && exit 1)

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: management-group-rbac-tfplan
          path: tfplan

  apply:
    name: Apply (manual)
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_apply == 'true'
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      TF_VAR_principal_object_id: ${{ secrets.TF_VAR_PRINCIPAL_OBJECT_ID }}
      TF_VAR_root_management_group_id: ${{ secrets.TF_VAR_ROOT_MANAGEMENT_GROUP_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform apply
        run: terraform apply -auto-approve
